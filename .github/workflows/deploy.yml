name: Deploy MERN App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Install & Build Frontend
      - name: Build Frontend
        run: |
          cd sse
          npm install
          npm run build

      # 4️⃣ Upload Frontend Build to VPS (FIXED)
      - name: Upload Frontend Build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "sse/.next/**,sse/public/**,sse/package.json,sse/package-lock.json,sse/next.config.ts"
          target: "~/apps/sse-learning/sse"
          strip_components: 1

      # 5️⃣ Deploy Backend + Restart Services
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            cd ~/apps/sse-learning

            # Pull backend latest source
            git pull origin main

            # ----------------------
            # Backend
            # ----------------------
            cd backend
            npm install
            if pm2 describe backend > /dev/null; then
              pm2 reload backend --update-env
            else
              pm2 start index.js --name backend
            fi

            # ----------------------
            # Frontend
            # ----------------------
            cd ../sse
            npm install --production

            if pm2 describe sse > /dev/null; then
              pm2 reload sse --update-env
            else
              pm2 start node_modules/next/dist/bin/next --name sse -- start -p 3000
            fi

            pm2 save
