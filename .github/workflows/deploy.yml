name: Deploy MERN App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/apps/sse-learning
            git pull origin main

            # Backend
            cd backend
            npm install
            pm2 reload backend || pm2 start server.js --name backend

            # Frontend (Next.js)
            cd ../sse
            npm install
            npm run build
            pm2 reload sse || pm2 start npm --name sse -- start
