name: Deploy MERN App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3️⃣ Build Frontend (Standalone)
      - name: Build Frontend
        run: |
          cd sse
          npm ci
          npm run build
          cp -r public .next/standalone/
          cp -r .next/static .next/standalone/.next/

      # 4️⃣ Reset Repo on VPS FIRST
      - name: Reset Repository on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e

            echo "🔄 Resetting repository"

            cd ~/apps/sse-learning

            git fetch origin
            git reset --hard origin/main
            git clean -fd

      # 5️⃣ Upload Frontend Build AFTER Reset
      - name: Upload Frontend Build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "sse/.next/standalone/**"
          target: "~/apps/sse-learning/sse/.next/standalone"
          strip_components: 3

      # 6️⃣ Restart Services
      - name: Restart Services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e

            cd ~/apps/sse-learning

            # ----------------------
            # Restart Backend
            # ----------------------
            cd backend
            if pm2 describe backend > /dev/null; then
              pm2 reload backend --update-env
            else
              pm2 start index.js --name backend
            fi

            # ----------------------
            # Restart Frontend
            # ----------------------
            cd ../sse/.next/standalone
            if pm2 describe sse > /dev/null; then
              pm2 reload sse --update-env
            else
              PORT=3000 HOSTNAME=0.0.0.0 pm2 start server.js --name sse
            fi

            pm2 save

            echo "✅ Deployment Complete"
